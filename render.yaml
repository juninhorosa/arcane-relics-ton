services:
  - type: web
    name: arcane-relics-ton
    runtime: node
    plan: free
    region: oregon
    branch: main
    buildCommand: bun install && bun run build
    startCommand: node .output/server/index.mjs
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      # ---- Supabase (Lovable Cloud) ----
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_PUBLISHABLE_KEY
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
      - key: VITE_SUPABASE_PROJECT_ID
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_PUBLISHABLE_KEY
        sync: false
      - key: SUPABASE_PROJECT_ID
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      # ---- Telegram / TON (preencha quando configurar) ----
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_WEBHOOK_SECRET
        sync: false
      - key: TON_RECEIVER_WALLET
        sync: false
      # ---- Lovable AI (opcional) ----
      - key: LOVABLE_API_KEY
        sync: false
